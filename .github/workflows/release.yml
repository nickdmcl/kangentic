name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # When triggered manually, create and push the tag first.
  # Requires approval from the 'release' environment (Settings > Environments).
  create-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 5
    outputs:
      tag: v${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify version matches package.json
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::Input version (${{ inputs.version }}) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

  release:
    needs: [create-tag]
    if: always() && (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    environment: release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Extract changelog section for this version to use as release body.
      # Handles both tag-push (GITHUB_REF) and workflow_dispatch (inputs.version).
      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          SECTION=$(awk "/^## \\[v${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$SECTION" ]; then
            SECTION="Release v${VERSION}"
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$SECTION"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # Install Apple Developer ID certificate into a temporary keychain
      - name: Install Apple signing certificate
        if: startsWith(matrix.platform, 'macos') && secrets.APPLE_CERTIFICATE_BASE64 != ''
        shell: bash
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # macOS code signing and notarization
      - name: Set macOS signing env
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_IDENTITY }}" ]; then
            echo "APPLE_IDENTITY=${{ secrets.APPLE_IDENTITY }}" >> $GITHUB_ENV
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> $GITHUB_ENV
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
          fi

      # Windows code signing (Azure Trusted Signing)
      - name: Set up Azure Trusted Signing
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if ("${{ secrets.AZURE_TENANT_ID }}" -ne "") {
            # Download nuget.exe
            Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile "$env:RUNNER_TEMP\nuget.exe"

            # Install the Artifact Signing dlib via NuGet
            & "$env:RUNNER_TEMP\nuget.exe" install Microsoft.ArtifactSigning.Client -x -OutputDirectory "$env:RUNNER_TEMP\signing"

            # Find the dlib path
            $dlibPath = (Get-ChildItem -Path "$env:RUNNER_TEMP\signing" -Recurse -Filter "Azure.CodeSigning.Dlib.dll" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1).FullName

            # Write metadata.json
            $metadata = @{
              Endpoint = "${{ secrets.AZURE_SIGNING_ENDPOINT }}"
              CodeSigningAccountName = "${{ secrets.AZURE_SIGNING_ACCOUNT }}"
              CertificateProfileName = "${{ secrets.AZURE_CERT_PROFILE }}"
            } | ConvertTo-Json
            $metadataPath = "$env:RUNNER_TEMP\metadata.json"
            $metadata | Out-File -FilePath $metadataPath -Encoding utf8NoBOM

            # Set env vars for forge.config.ts / build/windowsSign.ts
            echo "AZURE_CODE_SIGNING_DLIB=$dlibPath" >> $env:GITHUB_ENV
            echo "AZURE_METADATA_JSON=$metadataPath" >> $env:GITHUB_ENV
            echo "AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $env:GITHUB_ENV
            echo "AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $env:GITHUB_ENV
            echo "AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" >> $env:GITHUB_ENV
          }

      - run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
