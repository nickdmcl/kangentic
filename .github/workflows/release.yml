name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # When triggered manually, create and push the tag first.
  create-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: v${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify version matches package.json
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::Input version (${{ inputs.version }}) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

  release:
    needs: [create-tag]
    if: always() && (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    environment: release-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      # Import Apple Developer ID certificate using Apple's official action.
      # Handles keychain creation, partition list, and default keychain setup.
      - name: Install Apple signing certificate
        if: startsWith(matrix.platform, 'macos')
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify signing identity
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "Default keychain:"
          security default-keychain
          echo "Signing identities:"
          security find-identity -v -p codesigning

      # Block OCSP/timestamp lookups that cause codesign to hang on CI.
      # OCSP is a soft failure -- blocking it makes codesign skip the check.
      - name: Block OCSP for codesign
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "127.0.0.1 ocsp.apple.com" | sudo tee -a /etc/hosts
          echo "127.0.0.1 ocsp2.apple.com" | sudo tee -a /etc/hosts
          sudo dscacheutil -flushcache
          sudo killall -HUP mDNSResponder

      - name: Build and publish
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Azure Trusted Signing (Windows custom sign script)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SIGNING_ENDPOINT: https://eus.codesigning.azure.net/
          AZURE_SIGNING_ACCOUNT: sign-kangentic
          AZURE_CERT_PROFILE: kangentic-signing

  publish-notes:
    needs: [release]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Determine version tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set release body from RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.version.outputs.tag }}" --notes-file RELEASE_NOTES.md

  publish-npm:
    needs: [release]
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish launcher to npm
        run: npm publish --access public -w packages/launcher
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
