name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
      github.event_name == 'pull_request_target'
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        with:
          path-to-document: 'https://github.com/Kangentic/kangentic/blob/main/CLA.md'
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'cla-signatures'
          custom-notsigned-prcomment: |
            Thank you for your pull request! Before we can merge it, you need to sign our [Contributor License Agreement](https://github.com/Kangentic/kangentic/blob/main/CLA.md).

            Please read it and then comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to do this once for all future contributions.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          allowlist: 'Tyler-V,bot*,dependabot[bot],github-actions[bot],renovate[bot]'
          lock-pullrequest-aftermerge: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
