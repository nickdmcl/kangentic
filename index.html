<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./resources/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./resources/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./resources/favicon-16x16.png" />
    <title>Kangentic</title>
    <script>
      // Synchronous theme application to prevent FOUC.
      // Reads the resolved theme from localStorage before any CSS or React loads.
      (function() {
        try {
          var t = localStorage.getItem('kng-resolved-theme');
          if (t && t !== 'dark') document.documentElement.classList.add('theme-' + t);
        } catch(e) {}
      })();
    </script>
  </head>
  <body class="bg-surface text-fg overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/renderer/index.tsx"></script>
  </body>
</html>
